# ──────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Deploy to Azure Spring Apps
#
# Triggered on every push to the main branch.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS        - Service principal JSON (see setup guide below)
#   AZURE_SUBSCRIPTION_ID    - Your Azure subscription ID
#
# Required GitHub Variables (Settings → Variables → Actions):
#   AZURE_RESOURCE_GROUP     - e.g. my-resource-group
#   AZURE_SPRING_APPS_NAME   - e.g. my-spring-apps-instance
#   SPRING_APP_NAME          - e.g. login-service
# ──────────────────────────────────────────────────────────────────────

name: Build and Deploy to Azure Spring Apps

on:
  push:
    branches:
      - main

jobs:

  # ────────────────────────────────────────────
  # Job 1: Build the JAR with Maven
  # ────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven           # caches ~/.m2 between runs to speed things up

      - name: Build with Maven (skip tests for demo speed)
        run: mvn clean package -DskipTests

      # Upload the JAR so the deploy job can grab it
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ────────────────────────────────────────────
  # Job 2: Deploy the JAR to Azure Spring Apps
  # ────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build            # only runs if build job succeeds

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # Log in to Azure using a service principal stored as a secret.
      # To create the secret, run in Azure CLI:
      #   az ad sp create-for-rbac \
      #     --name "github-login-service" \
      #     --role contributor \
      #     --scopes /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP> \
      #     --sdk-auth
      # Copy the JSON output into a GitHub secret called AZURE_CREDENTIALS.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy the JAR directly to Azure Spring Apps.
      # Azure Spring Apps detects it is a Spring Boot app and runs it automatically.
      - name: Deploy to Azure Spring Apps
        uses: azure/spring-apps-deploy@v1
        with:
          azure-subscription:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          action:                   deploy
          service-name:             ${{ vars.AZURE_SPRING_APPS_NAME }}
          app-name:                 ${{ vars.SPRING_APP_NAME }}
          use-build-service:        false         # we supply our own JAR
          package:                  target/*.jar
          # The app will be reachable at:
          # https://<AZURE_SPRING_APPS_NAME>-<SPRING_APP_NAME>.azuremicroservices.io
