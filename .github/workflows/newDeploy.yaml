# ================================================================
# Deploy to Azure Spring Apps (Basic Tier)
#
# Triggers: push to main branch
# Steps:    build → test → deploy
#
# ----------------------------------------------------------------
# ONE-TIME SETUP — add these to your GitHub repo before first run
#
# Go to: Settings → Secrets and variables → Actions
#
# SECRETS (sensitive — never shown in logs):
#   AZURE_CREDENTIALS
#     How to get it — run this in Azure CLI:
#
#     az ad sp create-for-rbac \
#       --name "github-login-service-sp" \
#       --role contributor \
#       --scopes /subscriptions/YOUR_SUBSCRIPTION_ID/resourceGroups/YOUR_RESOURCE_GROUP \
#       --sdk-auth
#
#     Copy the entire JSON output as the secret value.
#
#   AZURE_SUBSCRIPTION_ID
#     Your Azure subscription ID (a UUID like xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)
#     Find it: Azure Portal → Subscriptions, or run: az account show --query id
#
# VARIABLES (non-sensitive — visible in logs):
#   AZURE_RESOURCE_GROUP      e.g.  my-resource-group
#   AZURE_SPRING_APPS_NAME    e.g.  my-spring-apps-instance
#   SPRING_APP_NAME           e.g.  login-service
# ================================================================

name: Build, Test and Deploy — Azure Spring Apps

on:
  push:
    branches:
      - main

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents stale deploys from queuing up behind each other.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────
  # JOB 1 — Build and run tests
  # Fails fast: if tests fail, deploy never runs.
  # ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      # 1. Pull the code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 17 and cache Maven dependencies.
      #    The cache key is based on pom.xml, so the cache is
      #    invalidated automatically when dependencies change.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compile the project and run all unit tests.
      #    If any test fails, Maven exits with a non-zero code
      #    and GitHub Actions marks this step (and the job) as failed.
      #    The deploy job depends on this job, so it will be skipped too.
      - name: Run tests
        run: mvn clean test

      # 4. Package into a runnable JAR (tests already passed above,
      #    so we skip them here to avoid running them twice).
      - name: Package JAR
        run: mvn package -DskipTests

      # 5. Save the JAR so the deploy job can pick it up.
      #    retention-days: 1 keeps storage costs near zero.
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1


  # ──────────────────────────────────────────
  # JOB 2 — Deploy to Azure Spring Apps
  # Only runs when build-and-test job succeeds.
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test   # hard dependency — won't run if tests fail

    # Shows "Production" environment label on the GitHub Actions UI
    # and lets you add manual approval gates later if needed.
    environment: production

    steps:

      # 1. Download the JAR built by the previous job
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # 2. Authenticate with Azure using the service principal JSON.
      #    This is equivalent to running "az login" interactively.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. (Optional sanity check) Print the app's current state
      #    before deploying so you have a before/after in the logs.
      - name: Show current app state
        run: |
          az spring app show \
            --name ${{ vars.SPRING_APP_NAME }} \
            --service ${{ vars.AZURE_SPRING_APPS_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query "{status:properties.status, instances:properties.activeDeploymentName}" \
            --output table

      # 4. Deploy the JAR to Azure Spring Apps Basic tier.
      #
      #    use-build-service: false
      #      We supply our own JAR, so we don't need Azure's
      #      build service (which would re-compile the code on Azure).
      #      This is faster and gives us full control over the build.
      #
      #    The app URL after deploy:
      #    https://<AZURE_SPRING_APPS_NAME>-<SPRING_APP_NAME>.azuremicroservices.io
      - name: Deploy to Azure Spring Apps
        uses: azure/spring-apps-deploy@v1
        with:
          azure-subscription:   ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          action:               deploy
          service-name:         ${{ vars.AZURE_SPRING_APPS_NAME }}
          app-name:             ${{ vars.SPRING_APP_NAME }}
          use-build-service:    false
          package:              target/*.jar

      # 5. Wait for the new instance to pass its health probe,
      #    then print the public URL so it's easy to find in logs.
      - name: Print app URL
        run: |
          echo "-------------------------------------------"
          echo "  Deploy complete!"
          echo "  App URL:"
          echo "  https://${{ vars.AZURE_SPRING_APPS_NAME }}-${{ vars.SPRING_APP_NAME }}.azuremicroservices.io"
          echo "  Health check:"
          echo "  https://${{ vars.AZURE_SPRING_APPS_NAME }}-${{ vars.SPRING_APP_NAME }}.azuremicroservices.io/actuator/health"
          echo "-------------------------------------------"

      # 6. Log out of Azure — good hygiene, removes the token from the runner.
      - name: Log out of Azure
        if: always()   # runs even if a previous step failed
        run: az logout
